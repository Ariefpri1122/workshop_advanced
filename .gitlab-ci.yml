      - if echo "$var" | grep -q '"total_matches":1';then hasil="cocok";else hasil="gagal";fi
      - echo $hasil
      - pembanding="cocok"
      - echo $pembanding
      - chmod +x BluePrint_Launch.sh
      - chmod +x update_image.sh
      - if [ "$hasil" == "$pembanding" ]; then ./update_image_development.sh; else ./BluePrint_Launch_development.sh;fi
    only:
        refs:
          - Development
        variables:
          - $CI_COMMIT_MESSAGE =~ /bungkus & produksi/
          - $CI_COMMIT_MESSAGE =~ /nyalip/
